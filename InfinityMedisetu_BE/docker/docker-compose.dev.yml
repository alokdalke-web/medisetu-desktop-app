services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper-dev
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2182:2181'
    volumes:
      - zookeeper-data-dev:/var/lib/zookeeper/data
      - zookeeper-log-dev:/var/lib/zookeeper/log
    healthcheck:
      test: echo srvr | nc localhost 2181 || exit 1
      interval: 10s
      retries: 5
      start_period: 10s
    logging:
      driver: 'json-file'

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-dev
    restart: always
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '9093:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 60000
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 1
    volumes:
      - kafka-data-dev:/var/lib/kafka/data
    healthcheck:
      test: nc -z localhost 9092 || exit 1
      interval: 10s
      retries: 10
      start_period: 15s
    logging:
      driver: 'json-file'

  redis:
    image: redis:7-alpine
    container_name: redis-dev
    restart: always
    command: redis-server --appendonly yes
    ports:
      - '6380:6379'
    volumes:
      - redis-data-dev:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      retries: 5
      start_period: 5s
    logging:
      driver: 'json-file'

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cms-backend-app-dev
    restart: always
    ports:
      - '5000:5000'
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      - NODE_ENV=development
      - KAFKA_BROKERS=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=5000
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5000/ || exit 1
      interval: 30s
      retries: 3
      start_period: 40s
    logging:
      driver: 'json-file'

volumes:
  kafka-data-dev:
  redis-data-dev:
  zookeeper-data-dev:
  zookeeper-log-dev:
